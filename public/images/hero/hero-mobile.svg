<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1280" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Italian fabric texture placeholder">
  <defs>
    <linearGradient id="warmthM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9b49a"/>
      <stop offset="0.5" stop-color="#a89374"/>
      <stop offset="1" stop-color="#7a6347"/>
    </linearGradient>
    <linearGradient id="bottomShadeM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.4"/>
    </linearGradient>
    <pattern id="weaveM" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <rect width="36" height="36" fill="url(#warmthM)"/>
      <path d="M0 6 H36 M0 18 H36 M0 30 H36" stroke="#6f5a3e" stroke-width="1.6" stroke-opacity="0.35"/>
      <path d="M6 0 V36 M18 0 V36 M30 0 V36" stroke="#d9c4a3" stroke-width="1.6" stroke-opacity="0.3"/>
    </pattern>
    <filter id="grainM">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="11"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.4  0 0 0 0 0.3  0 0 0 0 0.2  0 0 0 0.12 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <rect width="720" height="1280" fill="url(#weaveM)"/>
  <rect width="720" height="1280" fill="url(#warmthM)" opacity="0.25"/>
  <rect width="720" height="1280" filter="url(#grainM)" opacity="0.5"/>
  <rect width="720" height="1280" fill="url(#bottomShadeM)"/>
</svg>
