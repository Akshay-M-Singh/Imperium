<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Italian fabric texture placeholder">
  <defs>
    <linearGradient id="warmth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9b49a"/>
      <stop offset="0.5" stop-color="#a89374"/>
      <stop offset="1" stop-color="#7a6347"/>
    </linearGradient>
    <linearGradient id="bottomShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.35"/>
    </linearGradient>
    <pattern id="weave" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <rect width="48" height="48" fill="url(#warmth)"/>
      <path d="M0 8 H48 M0 24 H48 M0 40 H48" stroke="#6f5a3e" stroke-width="2" stroke-opacity="0.35"/>
      <path d="M8 0 V48 M24 0 V48 M40 0 V48" stroke="#d9c4a3" stroke-width="2" stroke-opacity="0.3"/>
      <path d="M0 8 H48 M0 24 H48 M0 40 H48" stroke="#3a2c1a" stroke-width="1" stroke-opacity="0.18"/>
    </pattern>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.4  0 0 0 0 0.3  0 0 0 0 0.2  0 0 0 0.12 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#weave)"/>
  <rect width="1920" height="1080" fill="url(#warmth)" opacity="0.25"/>
  <rect width="1920" height="1080" filter="url(#grain)" opacity="0.5"/>
  <rect width="1920" height="1080" fill="url(#bottomShade)"/>
</svg>
