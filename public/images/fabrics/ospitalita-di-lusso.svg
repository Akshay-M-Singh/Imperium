<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500" aria-hidden="true">
  <defs>
    <filter id="wool-noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.45" numOctaves="5" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="softNoise">
        <feFuncA type="linear" slope="0.22"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in="softNoise" in2="SourceGraphic" result="blend"/>
    </filter>
    <pattern id="wool-twill" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="12" height="12" fill="#cfc3b0"/>
      <path d="M0 0h6v12h-6z" fill="#c4b6a3"/>
      <path d="M6 0h6v12h-6z" fill="#d8cec0"/>
    </pattern>
    <linearGradient id="wool-warmth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e3d8c8"/>
      <stop offset="50%" stop-color="#d4c7b4"/>
      <stop offset="100%" stop-color="#c6b7a3"/>
    </linearGradient>
    <radialGradient id="wool-light" cx="70%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fff8ed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fff8ed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="500" fill="url(#wool-warmth)"/>
  <rect width="400" height="500" fill="url(#wool-twill)" filter="url(#wool-noise)"/>
  <rect width="400" height="500" fill="url(#wool-light)"/>
</svg>