<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500" aria-hidden="true">
  <defs>
    <filter id="silk-noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.15 0.6" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="softNoise">
        <feFuncA type="linear" slope="0.12"/>
      </feComponentTransfer>
      <feBlend mode="overlay" in="softNoise" in2="SourceGraphic" result="blend"/>
    </filter>
    <linearGradient id="silk-sheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f0e3"/>
      <stop offset="35%" stop-color="#efe5d4"/>
      <stop offset="55%" stop-color="#e6d5b8"/>
      <stop offset="75%" stop-color="#f0e6d6"/>
      <stop offset="100%" stop-color="#dcc9a8"/>
    </linearGradient>
    <linearGradient id="silk-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#silk-sheen)"/>
  <rect width="400" height="500" fill="#c4a76c" fill-opacity="0.08" filter="url(#silk-noise)"/>
  <path d="M0 120 Q 200 80 400 140 L 400 220 Q 200 160 0 200 Z" fill="url(#silk-glow)" fill-opacity="0.4"/>
  <path d="M0 320 Q 200 280 400 340 L 400 420 Q 200 360 0 400 Z" fill="url(#silk-glow)" fill-opacity="0.25"/>
</svg>