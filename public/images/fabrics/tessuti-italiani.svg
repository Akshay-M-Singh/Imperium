<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500" aria-hidden="true">
  <defs>
    <filter id="linen-noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="softNoise">
        <feFuncA type="linear" slope="0.18"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in="softNoise" in2="SourceGraphic" result="blend"/>
    </filter>
    <pattern id="linen-weave" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#e8e0d4"/>
      <path d="M0 4h8M4 0v8" stroke="#d9cfc0" stroke-width="0.75" fill="none"/>
      <path d="M0 0h8v8h-8z" stroke="#cdc2b0" stroke-width="0.4" fill="none"/>
    </pattern>
    <linearGradient id="linen-warmth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5efe6"/>
      <stop offset="45%" stop-color="#ebe3d6"/>
      <stop offset="100%" stop-color="#ddd3c3"/>
    </linearGradient>
    <radialGradient id="linen-light" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#fffdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fffdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="500" fill="url(#linen-warmth)"/>
  <rect width="400" height="500" fill="url(#linen-weave)" filter="url(#linen-noise)"/>
  <rect width="400" height="500" fill="url(#linen-light)"/>
</svg>